app = "muffs"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "muffs_data"
  destination = "/data"

[env]
  # Single volume root; DB + memory live under /data/db and /data/workspace/… (see agentMuffs/workspace.py)
  MUFFS_WORKSPACE = "/data"
  NEXT_PUBLIC_APP_URL = "https://muffs.fly.dev"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[processes]]
  name = "web"
  command = "node dashboard/.next/standalone/server.js"

[[processes]]
  name = "worker"
  command = "python -m uvicorn agentMuffs.agent:app --host 0.0.0.0 --port 8000"
